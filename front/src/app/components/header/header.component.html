<header class="header">
  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">⚡</div>
    <div class="brand-text">
      <span class="brand-name">DISTRIBUTION NETWORK</span>
      <span class="brand-sub">Lagos Metro · Real-time overview</span>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 20 20" fill="none">
      <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.5"/>
      <path d="M15 15l-3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input
      class="search-input"
      type="text"
      placeholder="Search feeder or area..."
      [(ngModel)]="searchQuery"
    />
  </div>

  <!-- Controls -->
  <div class="controls">
    <!-- View selector -->
    <div class="tab-group">
      <button
        *ngFor="let v of views"
        class="tab-btn"
        [class.active]="selectedView === v.value"
        (click)="selectView(v.value)"
      >{{ v.label }}</button>
    </div>

    <!-- Live indicator -->
    <div class="live-badge" [class.live]="isLive">
      <span class="live-dot"></span>
      {{ isLive ? 'Live' : 'Paused' }}
    </div>
  </div>
</header>
